version: '2.4'

services:
  readsb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: readsb
    network_mode: host
    environment:
      - TZ=Etc/UTC
      - READSB_ARGS=--net --device-type rtlsdr
    volumes:
      - config:/config
      - json:/run/readsb
    devices:
      - /dev/bus/usb:/dev/bus/usb
    labels:
      io.balena.features.kernel-modules: '1'
      io.balena.features.firmware: '1'
      io.balena.features.dbus: '1'
      io.balena.features.supervisor-api: '1'
      io.balena.features.balena-api: '1'
    ports:
      - "30001:30001"
      - "30002:30002"
      - "30003:30003"
      - "30004:30004"
      - "30005:30005"
      - "30104:30104"
    privileged: true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run
    read_only: false
    restart: unless-stopped

volumes:
  config:
  json:
