---
# project information
project_name: readsb
project_url: "https://github.com/wiedehopf/readsb"
project_logo: "https://raw.githubusercontent.com/wiedehopf/readsb/dev/logo.png"
project_blurb: "[{{ project_name|capitalize }}]({{ project_url }}) is an ADS-B decoder. This image is an unofficial community container built in a LinuxServer.io-style pattern, with hardened runtime defaults, s6 process supervision, and RTL-SDR support. Sponsored and maintained by Blackout Secure (https://blackoutsecure.app)."
project_lsio_github_repo_url: "https://github.com/blackoutsecure/docker-readsb"
project_categories: "Amateur Radio,Aviation,Networking,ADS-B"

# supported architectures
available_architectures:
  - {arch: "{{ arch_x86_64 }}", tag: "amd64-latest"}
  - {arch: "{{ arch_arm64 }}", tag: "arm64v8-latest"}

# common parameters
common_param_env_vars_enabled: true
param_container_name: "{{ project_name }}"
param_usage_include_vols: true
param_volumes:
  - {vol_path: "/config", vol_host_path: "/path/to/readsb/config", desc: "Configuration and persistent data"}
  - {vol_path: "/run/readsb", vol_host_path: "/path/to/readsb/json", desc: "JSON protocol output"}

param_usage_include_net: false
param_usage_include_env: true
param_env_vars:
  - {env_var: "TZ", env_value: "Etc/UTC", desc: "Timezone (see TZ database)"}
  - {env_var: "READSB_ARGS", env_value: "--net --device-type rtlsdr", desc: "Additional readsb arguments (auto-gain enabled by default for rtlsdr)"}

# optional env variables
opt_param_usage_include_env: true
opt_param_env_vars:
  - {env_var: "READSB_USER", env_value: "abc", desc: "Runtime user (default: abc). USB permissions are fixed automatically during init."}
  - {env_var: "PUID", env_value: "1000", desc: "User ID for file ownership (LinuxServer.io base image standard)"}
  - {env_var: "PGID", env_value: "1000", desc: "Group ID for file ownership (LinuxServer.io base image standard)"}
  - {env_var: "FEED_PROFILES", env_value: "", desc: "Comma-separated list of exchanges to feed (e.g. adsbexchange,adsb-fi). Defaults to adsbexchange if unset."}
  - {env_var: "FEED_UUID_<PROFILE>", env_value: "", desc: "Per-profile UUID. Use uppercase profile name with hyphens as underscores (e.g. FEED_UUID_ADSBEXCHANGE, FEED_UUID_ADSB_FI). Auto-generated on first run, persisted in /config/feed-uuid-<profile> and injected into s6 container env for downstream services."}
  - {env_var: "FEED_STATS_ENABLED", env_value: "true", desc: "Enable periodic console stats logging and ADSBx RSSI/stats upload. Console stats log every STATS_LOG_INTERVAL seconds. ADSBx upload activates automatically when adsbexchange is in FEED_PROFILES, using the same UUID as the beast feed."}
  - {env_var: "STATS_LOG_INTERVAL", env_value: "120", desc: "Console stats logging interval in seconds. Default is 120 (every 2 minutes). Set to e.g. 60 for 1 min or 300 for 5 min."}
  - {env_var: "FEED_UAT_INPUT", env_value: "", desc: "UAT 978MHz data source as host:port (e.g. dump978:30978). Requires blackoutsecure/dump978 sidecar."}
  - {env_var: "READSB_DEVICE", env_value: "", desc: "Manual: RTL-SDR device index or serial for 1090 MHz (overrides auto-detection)"}
  - {env_var: "FEED_LAT", env_value: "", desc: "Receiver latitude (fallback if --lat not in READSB_ARGS)"}
  - {env_var: "FEED_LON", env_value: "", desc: "Receiver longitude (fallback if --lon not in READSB_ARGS)"}
  - {env_var: "READSB_AUTO_LOCATION", env_value: "true", desc: "Auto-detect location via IP geolocation when FEED_LAT/FEED_LON not set"}
  - {env_var: "READSB_AUTOGAIN", env_value: "true", desc: "Enable automatic gain optimization. Analyzes strong signal percentage hourly and adjusts gain one step at a time. Persists to /config/autogain-gain. Overrides --gain auto with a managed fixed gain for better range. Set to false to use hardware AGC (--gain auto) instead."}
  - {env_var: "READSB_AUTOGAIN_INTERVAL", env_value: "3600", desc: "How often (seconds) the autogain service checks and adjusts gain. Default 3600 (1 hour)."}
  - {env_var: "READSB_AUTOGAIN_LOW", env_value: "0.5", desc: "Autogain low threshold (%). If strong signals fall below this, gain is increased."}
  - {env_var: "READSB_AUTOGAIN_HIGH", env_value: "7.0", desc: "Autogain high threshold (%). If strong signals exceed this, gain is decreased."}
  - {env_var: "READSB_BIASTEE", env_value: "false", desc: "Enable bias-T DC voltage on the RTL-SDR coax to power external LNAs or active antennas. Requires RTL-SDR Blog V3/V4 or compatible dongle. WARNING: only enable if your antenna needs DC power — sending voltage to a passive antenna can damage some dongles."}
  - {env_var: "LOG_LEVEL", env_value: "info", desc: "Minimum log verbosity: debug, info (default), warn, error, fatal. ADSBx per-upload confirmations are debug-level. Set to debug to see them, or warn to suppress routine informational messages."}

# optional parameters
optional_parameters: |
  The container exposes multiple ports for ADS-B protocol outputs:

  ```
    -p 30001:30001  # Raw protocol output
    -p 30002:30002  # Raw protocol input
    -p 30003:30003  # SBS protocol output
    -p 30004:30004  # Beast protocol output
    -p 30005:30005  # Beast protocol input
    -p 30104:30104  # JSON protocol output
  ```

  For RTL-SDR device access:

  ```
    --device=/dev/bus/usb:/dev/bus/usb
  ```

# application setup block
app_setup_block_enabled: true
app_setup_block: |
  By default, the container runs readsb with network mode enabled (`--net` flag) and auto-detects RTL-SDR devices.

  **JSON Output**: ADS-B data is output as JSON to `/run/readsb/` and updated frequently. This can be consumed by visualization tools or other services.

  **RTL-SDR Hardware**: Pass RTL-SDR USB device(s) to the container using `--device=/dev/bus/usb:/dev/bus/usb`.

  **Automatic Gain Optimization**: Enabled by default (`READSB_AUTOGAIN=true`). Analyzes strong signal percentage hourly and steps through the RTL-SDR gain table to find the optimal fixed gain. Much better than hardware AGC. Gain persists across restarts in `/config/autogain-gain`. Set `READSB_AUTOGAIN=false` to fall back to `--gain auto`.

  **Bias-T Power**: Set `READSB_BIASTEE=true` to enable DC power on the coax for active antennas with built-in LNAs. Disabled by default — only enable if your antenna requires it.

  **Custom Arguments**: Use `READSB_ARGS` to pass additional readsb options:
  - `--gain 40` - Set manual gain (overrides autogain)
  - `--freq-correction 10` - Add frequency correction (PPM)
  - `--lat 51.5 --lon -0.1` - Set location for range calculations
  - `--max-range 350` - Set maximum detection range (km)

  **Health Monitoring**: The image includes a Docker `HEALTHCHECK` that verifies `aircraft.json` freshness every 30 seconds. Use `docker inspect --format='{{.State.Health.Status}}' readsb` to check status.

  **Periodic Stats**: `svc-feed-stats` logs a summary every 2 minutes by default (configurable via `STATS_LOG_INTERVAL`). When `adsbexchange` is in `FEED_PROFILES`, also uploads RSSI/stats data to ADSBx every 5 seconds using the same UUID as the beast feed. The stats URL is logged at startup.

  **Log Verbosity**: Set `LOG_LEVEL` to control log output. Default is `info`. Use `debug` for verbose output (includes per-upload ADSBx confirmations), `warn` for quieter operation.

  **RTL-SDR Tools**: The runtime image includes `rtl_test`, `rtl_eeprom`, and `rtl_biast` for dongle diagnostics, serial tagging, and bias-T control. USB device permissions are fixed automatically during init.

  For all available options, see the [readsb documentation](https://github.com/wiedehopf/readsb).

# hardware acceleration
readme_hwaccel: false

# read-only support
readonly_supported: true
readonly_message: |
  Read-only operation is supported. Mount JSON and temp directories to volumes or tmpfs.

# non-root support
nonroot_supported: true
nonroot_message: |
  Non-root operation is the default. RTL-SDR USB device permissions are fixed automatically during container init.
