---
# project information
project_name: readsb
project_url: "https://github.com/wiedehopf/readsb"
project_logo: "https://raw.githubusercontent.com/wiedehopf/readsb/dev/logo.png"
project_blurb: "[{{ project_name|capitalize }}]({{ project_url }}) is an ADS-B decoder. This image is an unofficial community container built in a LinuxServer.io-style pattern, with hardened runtime defaults, s6 process supervision, and RTL-SDR support. Sponsored and maintained by Blackout Secure (https://blackoutsecure.app)."
project_lsio_github_repo_url: "https://github.com/blackoutsecure/docker-readsb"
project_categories: "Amateur Radio,Aviation,Networking,ADS-B"

# supported architectures
available_architectures:
  - {arch: "{{ arch_x86_64 }}", tag: "amd64-latest"}
  - {arch: "{{ arch_arm64 }}", tag: "arm64v8-latest"}

# common parameters
common_param_env_vars_enabled: true
param_container_name: "{{ project_name }}"
param_usage_include_vols: true
param_volumes:
  - {vol_path: "/config", vol_host_path: "/path/to/readsb/config", desc: "Configuration and persistent data"}
  - {vol_path: "/run/readsb", vol_host_path: "/path/to/readsb/json", desc: "JSON protocol output"}

param_usage_include_net: false
param_usage_include_env: true
param_env_vars:
  - {env_var: "TZ", env_value: "Etc/UTC", desc: "Timezone (see TZ database)"}
  - {env_var: "READSB_ARGS", env_value: "--net --device-type rtlsdr", desc: "Additional readsb arguments (auto-gain enabled by default for rtlsdr)"}

# optional env variables
opt_param_usage_include_env: true
opt_param_env_vars:
  - {env_var: "READSB_USER", env_value: "root", desc: "Runtime user. Root is recommended for USB device access."}
  - {env_var: "PUID", env_value: "", desc: "Optional: User ID for non-root mode (defaults to 911 if READSB_USER is set)"}
  - {env_var: "PGID", env_value: "", desc: "Optional: Group ID for non-root mode (defaults to 911 if READSB_USER is set)"}
  - {env_var: "FEED_PROFILES", env_value: "", desc: "Comma-separated list of exchanges to feed (e.g. adsbexchange,adsb-fi). Empty = no feeding."}
  - {env_var: "FEED_UUID", env_value: "", desc: "Feeder UUID (auto-generated on first run, persisted in /config/feed-uuid)"}
  - {env_var: "FEED_STATS_ENABLED", env_value: "true", desc: "Enable ADSBx stats upload (only when adsbexchange is in FEED_PROFILES)"}
  - {env_var: "FEED_UAT_INPUT", env_value: "", desc: "UAT 978MHz data source as host:port (e.g. dump978:30978)"}
  - {env_var: "FEED_LAT", env_value: "", desc: "Receiver latitude (fallback if --lat not in READSB_ARGS)"}
  - {env_var: "FEED_LON", env_value: "", desc: "Receiver longitude (fallback if --lon not in READSB_ARGS)"}
  - {env_var: "READSB_AUTO_LOCATION", env_value: "true", desc: "Auto-detect location via IP geolocation when FEED_LAT/FEED_LON not set"}

# optional parameters
optional_parameters: |
  The container exposes multiple ports for ADS-B protocol outputs:

  ```
    -p 30001:30001  # Raw protocol output
    -p 30002:30002  # Raw protocol input
    -p 30003:30003  # SBS protocol output
    -p 30004:30004  # Beast protocol output
    -p 30005:30005  # Beast protocol input
    -p 30104:30104  # JSON protocol output
  ```

  For RTL-SDR device access:

  ```
    --device=/dev/bus/usb:/dev/bus/usb
  ```

# application setup block
app_setup_block_enabled: true
app_setup_block: |
  By default, the container runs readsb with network mode enabled (`--net` flag) and auto-detects RTL-SDR devices.

  **JSON Output**: ADS-B data is output as JSON to `/run/readsb/` and updated frequently. This can be consumed by visualization tools or other services.

  **RTL-SDR Hardware**: Pass RTL-SDR USB device(s) to the container using `--device=/dev/bus/usb:/dev/bus/usb`.

  **Custom Arguments**: Use `READSB_ARGS` to pass additional readsb options:
  - `--gain 40` - Set manual gain instead of auto
  - `--freq-correction 10` - Add frequency correction (PPM)
  - `--lat 51.5 --lon -0.1` - Set location for range calculations
  - `--max-range 350` - Set maximum detection range (km)

  For all available options, see the [readsb documentation](https://github.com/wiedehopf/readsb).

# hardware acceleration
readme_hwaccel: false

# read-only support
readonly_supported: true
readonly_message: |
  Read-only operation is supported. Mount JSON and temp directories to volumes or tmpfs.

# non-root support
nonroot_supported: true
nonroot_message: |
  Non-root operation is supported via `READSB_USER`. RTL-SDR access may require additional device permissions.
