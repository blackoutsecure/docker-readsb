version: '2.4'

services:
  readsb:
    image: docker.io/blackoutsecure/readsb:latest
    container_name: readsb
    environment:
      TZ: Etc/UTC
      READSB_ARGS: '--net --device-type rtlsdr'
    volumes:
      - config:/config
      - json:/run/readsb
    devices:
      - /dev/bus/usb:/dev/bus/usb
    labels:
      io.balena.features.kernel-modules: '1'
      io.balena.features.firmware: '1'
      io.balena.features.dbus: '1'
      io.balena.features.supervisor-api: '1'
      io.balena.features.balena-api: '1'
    ports:
      - "30001:30001"  # Raw protocol output (TCP)
      - "30002:30002"  # Raw protocol input/output (TCP)
      - "30003:30003"  # SBS protocol compatible (TCP)
      - "30004:30004"  # Beast protocol output (TCP)
      - "30005:30005"  # Beast protocol input (TCP)
      - "30104:30104"  # JSON protocol output (TCP)
    network_mode: host
    privileged: true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run:exec
    read_only: false
    restart: unless-stopped

volumes:
  config:
  json:
