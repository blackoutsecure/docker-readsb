# Caller for the hub's `sync-managed-files.yml` reusable.
#
# ---------------------------------------------------------------------------
# RETIREMENT NOTICE (staged for removal in a follow-up commit):
# ---------------------------------------------------------------------------
# The `bos_launchpad_sync_files` service below replaces this entire
# hand-authored caller with a hub-managed kicker at
# `.github/workflows/bos-launchpad-sync-files.yml`. The next scheduled
# run of this caller will write that kicker. Once the new kicker is
# verified working in this repo, DELETE this file — the kicker reads
# the `sync_files:` block in `.bos-launchpad.yaml` at the repo root
# and supersedes this caller entirely.
# ---------------------------------------------------------------------------
#
# Keeps managed dotfile sections (`.gitignore`, `.dockerignore`,
# `.editorconfig`, `.gitattributes`) AND canonical whole files
# (`root/usr/local/bin/log-functions.sh`) in sync with the hub. Section
# services only touch text between the `# >>> bos-automation-hub:<svc>
# >>>` markers; everything else is preserved. Whole-file services own
# the entire body — local edits to them will be reverted on next run.
#
# Enabled services are listed under `services:` below. Removing a
# service from that list is safe: existing managed sections / files
# for it are left untouched.

name: Sync managed files

on:
  schedule:
    - cron: '23 13 * * 1'   # Monday 13:23 UTC — stagger off :00
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-managed-files.yml'

permissions:
  contents: read

concurrency:
  group: sync-managed-files-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    permissions:
      contents: write   # required to push the canonical content back
    uses: blackoutsecure/bos-automation-hub/.github/workflows/sync-managed-files.yml@main
    with:
      services: |
        common
        docker
        balena
        logger
        lf_line_endings
        bos_launchpad_sync_files
