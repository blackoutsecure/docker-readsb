# Caller for the hub's `sync-managed-files.yml` reusable.
#
# docker-readsb is a Docker + s6-overlay shell-script project; the
# `logger` whole-file service ships the canonical
# `root/usr/local/bin/log-functions.sh`.

name: Sync managed files

on:
  schedule:
    - cron: '23 13 * * 1'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-managed-files.yml'

permissions:
  contents: read

concurrency:
  group: sync-managed-files-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    permissions:
      contents: write
    uses: meshsky/meshsky-automation/.github/workflows/sync-managed-files.yml@main
    with:
      services: |
        common
        docker
        balena
        logger
        lf_line_endings
        dependabot_actions
