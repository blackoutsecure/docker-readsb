name: Balena Build and Publish

on:
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile
      - balena-compose.yml
      - .dockerignore
      - root/**
      - .github/workflows/balena-publish.yml
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - balena-compose.yml
      - .dockerignore
      - root/**
      - .github/workflows/balena-publish.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NO_CACHE: 'true'
  BALENA_COMPOSE_FILE: balena-compose.yml
  BALENA_BLOCK_RELEASE: ${{ github.event.repository.name }}
  # Configure the following environment variables as secrets or repository variables:
  # BALENA_FLEET_RELEASE: your-balena-org/your-fleet-slug
  BALENA_FLEET_RELEASE: ${{ vars.BALENA_FLEET_RELEASE || 'org/fleet-placeholder' }}
  SHOULD_PUBLISH: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}

jobs:
  balena:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: block
            target_fleet: ${{ github.event.repository.name }}
          - target_name: fleet
            target_fleet: ${{ vars.BALENA_FLEET_RELEASE || 'org/fleet-placeholder' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required publish configuration
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        env:
          BALENA_API_TOKEN: ${{ secrets.BALENA_API_TOKEN }}
          TARGET_FLEET: ${{ matrix.target_fleet }}
          COMPOSE_FILE: ${{ env.BALENA_COMPOSE_FILE }}
        run: |
          set -euo pipefail

          if [ -z "${BALENA_API_TOKEN}" ]; then
            echo "BALENA_API_TOKEN secret is not set"
            exit 1
          fi

          if [ -z "${TARGET_FLEET}" ]; then
            echo "${{ matrix.target_name }} target fleet is not set"
            exit 1
          fi

          if [ "${TARGET_FLEET}" = "false" ]; then
            echo "${{ matrix.target_name }} target fleet is set to false. Configure a valid fleet slug."
            exit 1
          fi

          if [ ! -f "${COMPOSE_FILE}" ]; then
            echo "Compose file not found: ${COMPOSE_FILE}"
            exit 1
          fi

      - name: Set up Node.js
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install Balena CLI
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        run: npm install --global --no-progress --silent balena-cli@latest

      - name: Log in to Balena
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        env:
          BALENA_API_TOKEN: ${{ secrets.BALENA_API_TOKEN }}
        run: balena login --token "${BALENA_API_TOKEN}"

      - name: Deploy to Balena ${{ matrix.target_name }}
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        run: |
          set -euo pipefail
          cp "${{ env.BALENA_COMPOSE_FILE }}" docker-compose.yml
          echo "Deploying to ${{ matrix.target_name }}: ${{ matrix.target_fleet }}"
          balena push "${{ matrix.target_fleet }}" --source .
