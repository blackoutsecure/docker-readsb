name: Balena Build and Publish

on:
  pull_request:
    types: [opened, synchronize, closed]
    branches:
      - main
    paths:
      - Dockerfile
      - balena-compose.yml
      - balena.yml
      - .dockerignore
      - root/**
      - .github/workflows/balenablock-publish.yml
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - balena-compose.yml
      - balena.yml
      - .dockerignore
      - root/**
      - .github/workflows/balenablock-publish.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BALENA_BLOCK_RELEASE: readsb
  READSB_REPO_URL: https://github.com/wiedehopf/readsb
  READSB_REPO_BRANCH: dev

jobs:
  balena:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve upstream readsb metadata
        id: upstream
        run: |
          set -euo pipefail

          UPSTREAM_REPO_URL="${READSB_REPO_URL}.git"
          UPSTREAM_BRANCH="${READSB_REPO_BRANCH}"

          TMPDIR="$(mktemp -d)"
          trap 'rm -rf "${TMPDIR}"' EXIT

          git init "${TMPDIR}" >/dev/null
          git -C "${TMPDIR}" remote add origin "${UPSTREAM_REPO_URL}"
          git -C "${TMPDIR}" fetch --depth 1 origin "${UPSTREAM_BRANCH}" >/dev/null

          VCS_REF="$(git -C "${TMPDIR}" rev-parse FETCH_HEAD)"
          BUILD_DATE="$(git -C "${TMPDIR}" log -1 --format=%cI FETCH_HEAD)"
          VERSION="$(git -C "${TMPDIR}" show FETCH_HEAD:version 2>/dev/null || git -C "${TMPDIR}" describe --tags --always --dirty FETCH_HEAD 2>/dev/null || echo unknown)"

          {
            echo "vcs_ref=${VCS_REF}"
            echo "build_date=${BUILD_DATE}"
            echo "version=${VERSION}"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved upstream readsb version: ${VERSION}"

      - name: Update balena.yml with resolved version
        run: |
          set -euo pipefail
          VERSION="${{ steps.upstream.outputs.version }}"
          echo "Updating balena.yml version to: ${VERSION}"
          sed -i "s/^version: .*/version: ${VERSION}/" balena.yml
          grep "^version:" balena.yml

      - name: Deploy to Balena block
        uses: balena-io/deploy-to-balena-action@master
        with:
          balena_token: ${{ secrets.BALENA_API_TOKEN }}
          fleet: ${{ env.BALENA_BLOCK_RELEASE }}
          layer_cache: true
          debug: false
          source: .

      - name: Log deployment info
        run: |
          echo "Deployed to block: ${{ env.BALENA_BLOCK_RELEASE }}"
          echo "Version: ${{ steps.upstream.outputs.version }}"
          echo "Build date: ${{ steps.upstream.outputs.build_date }}"
          echo "VCS ref: ${{ steps.upstream.outputs.vcs_ref }}"
