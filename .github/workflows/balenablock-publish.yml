name: Balena Build and Publish

on:
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile
      - balena-compose.yml
      - .dockerignore
      - root/**
      - .github/workflows/balenablock-publish.yml
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - balena-compose.yml
      - .dockerignore
      - root/**
      - .github/workflows/balenablock-publish.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NO_CACHE: 'true'
  BALENA_COMPOSE_FILE: balena-compose.yml
  BALENA_BLOCK_RELEASE: readsb
  SHOULD_PUBLISH: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
  READSB_REPO_URL: https://github.com/wiedehopf/readsb
  READSB_REPO_BRANCH: dev

jobs:
  balena:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required publish configuration
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        env:
          BALENA_API_TOKEN: ${{ secrets.BALENA_API_TOKEN }}
          TARGET_FLEET: ${{ env.BALENA_BLOCK_RELEASE }}
          COMPOSE_FILE: ${{ env.BALENA_COMPOSE_FILE }}
        run: |
          set -euo pipefail

          if [ -z "${BALENA_API_TOKEN}" ]; then
            echo "BALENA_API_TOKEN secret is not set"
            exit 1
          fi

          if [ -z "${TARGET_FLEET}" ]; then
            echo "Block target fleet is not set"
            exit 1
          fi

          if [ "${TARGET_FLEET}" = "false" ]; then
            echo "Block target fleet is set to false. Configure a valid fleet slug."
            exit 1
          fi

          if [ ! -f "${COMPOSE_FILE}" ]; then
            echo "Compose file not found: ${COMPOSE_FILE}"
            exit 1
          fi

      - name: Set up Node.js
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install Balena CLI
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        run: npm install --global --no-progress --silent balena-cli@latest

      - name: Log in to Balena
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        env:
          BALENA_API_TOKEN: ${{ secrets.BALENA_API_TOKEN }}
        run: balena login --token "${BALENA_API_TOKEN}"

      - name: Resolve upstream readsb metadata
        id: upstream
        run: |
          set -euo pipefail

          UPSTREAM_REPO_URL="${READSB_REPO_URL}.git"
          UPSTREAM_BRANCH="${READSB_REPO_BRANCH}"

          TMPDIR="$(mktemp -d)"

          git init "${TMPDIR}" >/dev/null
          git -C "${TMPDIR}" remote add origin "${UPSTREAM_REPO_URL}"
          git -C "${TMPDIR}" fetch --depth 1 origin "${UPSTREAM_BRANCH}" >/dev/null

          VCS_REF="$(git -C "${TMPDIR}" rev-parse FETCH_HEAD)"
          BUILD_DATE="$(git -C "${TMPDIR}" log -1 --format=%cI FETCH_HEAD)"
          VERSION="$(git -C "${TMPDIR}" show FETCH_HEAD:version 2>/dev/null || git -C "${TMPDIR}" describe --tags --always --dirty FETCH_HEAD 2>/dev/null || echo unknown)"

          {
            echo "vcs_ref=${VCS_REF}"
            echo "build_date=${BUILD_DATE}"
            echo "version=${VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy to Balena block
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        run: |
          set -euo pipefail
          cp "${{ env.BALENA_COMPOSE_FILE }}" docker-compose.yml
          echo "Deploying to block: ${{ env.BALENA_BLOCK_RELEASE }}"
          echo "Version: ${{ steps.upstream.outputs.version }}"
          echo "Build date: ${{ steps.upstream.outputs.build_date }}"
          echo "VCS ref: ${{ steps.upstream.outputs.vcs_ref }}"
          balena push "${{ env.BALENA_BLOCK_RELEASE }}" --source .
