name: Balena Build and Publish

on:
  pull_request:
    types: [opened, synchronize, closed]
    branches:
      - main
    paths:
      - Dockerfile
      - balena-compose.yml
      - balena.yml
      - .dockerignore
      - root/**
      - .github/workflows/balenablock-publish.yml
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - balena-compose.yml
      - balena.yml
      - .dockerignore
      - root/**
      - .github/workflows/balenablock-publish.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BALENA_NAMESPACE: ${{ vars.BALENA_NAMESPACE || secrets.BALENA_USERNAME }}
  BALENA_BLOCK_RELEASE: readsb
  READSB_REPO_URL: https://github.com/wiedehopf/readsb
  READSB_REPO_BRANCH: dev

jobs:
  balena:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve upstream readsb metadata
        id: upstream
        run: |
          set -euo pipefail

          UPSTREAM_REPO_URL="${READSB_REPO_URL}.git"
          UPSTREAM_BRANCH="${READSB_REPO_BRANCH}"

          TMPDIR="$(mktemp -d)"
          trap 'rm -rf "${TMPDIR}"' EXIT

          git init "${TMPDIR}" >/dev/null
          git -C "${TMPDIR}" remote add origin "${UPSTREAM_REPO_URL}"
          git -C "${TMPDIR}" fetch --depth 1 origin "${UPSTREAM_BRANCH}" >/dev/null

          VCS_REF="$(git -C "${TMPDIR}" rev-parse FETCH_HEAD)"
          BUILD_DATE="$(git -C "${TMPDIR}" log -1 --format=%cI FETCH_HEAD)"
          VERSION="$(git -C "${TMPDIR}" show FETCH_HEAD:version 2>/dev/null || git -C "${TMPDIR}" describe --tags --always --dirty FETCH_HEAD 2>/dev/null || echo unknown)"

          {
            echo "vcs_ref=${VCS_REF}"
            echo "build_date=${BUILD_DATE}"
            echo "version=${VERSION}"
          } >> "$GITHUB_OUTPUT"

          echo "Resolved upstream readsb version: ${VERSION}"

      - name: Update balena.yml with resolved version
        run: |
          set -euo pipefail
          VERSION="${{ steps.upstream.outputs.version }}"
          echo "Updating balena.yml version from placeholder to: ${VERSION}"
          sed -i -E "s/^version: .*/version: ${VERSION}/" balena.yml
          grep "^version:" balena.yml

      - name: Persist balena.yml version
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          set -euo pipefail
          VERSION="${{ steps.upstream.outputs.version }}"

          if git diff --quiet -- balena.yml; then
            echo "balena.yml already matches ${VERSION}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add balena.yml
          git commit -m "chore: sync balena block version to ${VERSION}"
          git push

      - name: Prepare Balena source context
        run: |
          set -euo pipefail
          rm -rf .balena-source
          mkdir -p .balena-source
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.balena-source' \
            ./ .balena-source/
          cp .balena-source/balena-compose.yml .balena-source/docker-compose.yml
          echo "Using balena-compose.yml for block deployment"
          grep "^version:" .balena-source/docker-compose.yml
          grep "^version:" .balena-source/balena.yml

      - name: Publish Balena block release
        if: github.event_name != 'workflow_dispatch'
        id: balena-deploy
        uses: balena-io/deploy-to-balena-action@master
        with:
          balena_token: ${{ secrets.BALENA_API_TOKEN }}
          fleet: ${{ env.BALENA_NAMESPACE }}/${{ env.BALENA_BLOCK_RELEASE }}
          layer_cache: true
          debug: false
          source: ./.balena-source

      - name: Install Balena CLI for manual publish
        if: github.event_name == 'workflow_dispatch'
        run: npm install -g balena-cli

      - name: Publish Balena block release manually
        if: github.event_name == 'workflow_dispatch'
        id: balena-deploy-manual
        env:
          BALENA_TOKEN: ${{ secrets.BALENA_API_TOKEN }}
        run: |
          set -euo pipefail
          balena login --token "${BALENA_TOKEN}"
          balena push "${BALENA_NAMESPACE}/${BALENA_BLOCK_RELEASE}" \
            --source ./.balena-source \
            --release-tag balena-ci-commit-sha "${GITHUB_SHA}"
          RELEASE_ID=$(balena release list "${BALENA_NAMESPACE}/${BALENA_BLOCK_RELEASE}" --json | jq -r '.[0].id')
          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"

      - name: Set release notes (automated)
        if: github.event_name != 'workflow_dispatch'
        env:
          BALENA_TOKEN: ${{ secrets.BALENA_API_TOKEN }}
        run: |
          set -euo pipefail
          npm install -g balena-cli jq
          balena login --token "${BALENA_TOKEN}"
          VERSION="${{ steps.upstream.outputs.version }}"
          VCS_REF="${{ steps.upstream.outputs.vcs_ref }}"
          SHORT_REF="${VCS_REF:0:7}"
          RELEASE_ID=$(balena release list "${BALENA_NAMESPACE}/${BALENA_BLOCK_RELEASE}" --json | jq -r '.[0].id')
          NOTES="readsb ${VERSION} (upstream commit ${SHORT_REF})\n\nFull changelog: https://github.com/blackoutsecure/docker-readsb/releases"
          curl -X PATCH "https://api.balena-cloud.com/v7/release(${RELEASE_ID})" \
            -H "Authorization: Bearer ${BALENA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"notes\": \"${NOTES}\"}"
          echo "✓ Release ${RELEASE_ID} notes updated"

      - name: Set release notes (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          BALENA_TOKEN: ${{ secrets.BALENA_API_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.upstream.outputs.version }}"
          VCS_REF="${{ steps.upstream.outputs.vcs_ref }}"
          SHORT_REF="${VCS_REF:0:7}"
          RELEASE_ID="${{ steps.balena-deploy-manual.outputs.release_id }}"
          NOTES="readsb ${VERSION} (upstream commit ${SHORT_REF})\n\nFull changelog: https://github.com/blackoutsecure/docker-readsb/releases"
          curl -X PATCH "https://api.balena-cloud.com/v7/release(${RELEASE_ID})" \
            -H "Authorization: Bearer ${BALENA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"notes\": \"${NOTES}\"}"
          echo "✓ Release ${RELEASE_ID} notes updated"

      - name: Log deployment info
        run: |
          echo "Published block release slug: ${{ env.BALENA_NAMESPACE }}/${{ env.BALENA_BLOCK_RELEASE }}"
          echo "Version: ${{ steps.upstream.outputs.version }}"
          echo "Build date: ${{ steps.upstream.outputs.build_date }}"
          echo "VCS ref: ${{ steps.upstream.outputs.vcs_ref }}"
