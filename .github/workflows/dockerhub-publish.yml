name: Docker Build and Publish

on:
  pull_request:
    branches:
      - main
    paths:
      - Dockerfile
      - .dockerignore
      - root/**
      - .github/workflows/dockerhub-publish.yml
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - .dockerignore
      - root/**
      - .github/workflows/dockerhub-publish.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  BASE_IMAGE_REGISTRY: ghcr.io
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
  IMAGE_NAME: readsb
  REPO_URL: ${{ github.server_url }}/${{ github.repository }}
  READSB_REPO_URL: https://github.com/wiedehopf/readsb
  READSB_REPO_BRANCH: dev
  NO_CACHE: 'true'
  SHOULD_PUBLISH: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}

jobs:
  docker:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-latest-arm64
            platform: linux/arm64
    env: {}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate required secrets and namespace
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_NAMESPACE: ${{ env.DOCKERHUB_NAMESPACE }}
        run: |
          set -euo pipefail

          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "DOCKERHUB_USERNAME secret is not set"
            exit 1
          fi

          if [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "DOCKERHUB_TOKEN secret is not set"
            exit 1
          fi

          if [ -z "${DOCKERHUB_NAMESPACE}" ]; then
            echo "DOCKERHUB_NAMESPACE repo variable is not set"
            exit 1
          fi

          if [[ "${DOCKERHUB_USERNAME}" =~ [[:space:]] ]]; then
            echo "DOCKERHUB_USERNAME must not contain spaces"
            exit 1
          fi

          if [[ "${DOCKERHUB_NAMESPACE}" =~ [[:space:]] ]]; then
            echo "DOCKERHUB_NAMESPACE must not contain spaces (use Docker Hub org/user slug)"
            exit 1
          fi

          if ! [[ "${DOCKERHUB_NAMESPACE}" =~ ^[a-z0-9]+([._-][a-z0-9]+)*$ ]]; then
            echo "DOCKERHUB_NAMESPACE has invalid format. Use lowercase Docker Hub namespace slug only."
            exit 1
          fi

      - name: Docker Hub login
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Confirm Docker auth is active
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        run: docker info > /dev/null

      - name: Resolve upstream readsb metadata
        id: upstream
        run: |
          set -euo pipefail

          UPSTREAM_REPO_URL="${READSB_REPO_URL}.git"
          UPSTREAM_BRANCH="${READSB_REPO_BRANCH}"

          TMPDIR="$(mktemp -d)"
          trap 'rm -rf "${TMPDIR}"' EXIT

          git init "${TMPDIR}" >/dev/null
          git -C "${TMPDIR}" remote add origin "${UPSTREAM_REPO_URL}"
          git -C "${TMPDIR}" fetch --depth 1 origin "${UPSTREAM_BRANCH}" >/dev/null

          VCS_REF="$(git -C "${TMPDIR}" rev-parse FETCH_HEAD)"
          BUILD_DATE="$(git -C "${TMPDIR}" log -1 --format=%cI FETCH_HEAD)"
          VERSION="$(git -C "${TMPDIR}" show FETCH_HEAD:version 2>/dev/null || git -C "${TMPDIR}" describe --tags --always --dirty FETCH_HEAD 2>/dev/null || echo unknown)"

          {
            echo "vcs_ref=${VCS_REF}"
            echo "build_date=${BUILD_DATE}"
            echo "version=${VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Build only (PR/check mode)
        if: ${{ env.SHOULD_PUBLISH != 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          platforms: ${{ matrix.platform }}
          no-cache: ${{ env.NO_CACHE == 'true' }}
          pull: true
          provenance: false
          build-args: |
            BASE_IMAGE_REGISTRY=${{ env.BASE_IMAGE_REGISTRY }}
            READSB_REPO_URL=${{ env.READSB_REPO_URL }}
            READSB_REPO_BRANCH=${{ env.READSB_REPO_BRANCH }}
            VCS_URL=${{ env.REPO_URL }}
          labels: |
            org.opencontainers.image.created=${{ steps.upstream.outputs.build_date }}
            org.opencontainers.image.version=${{ steps.upstream.outputs.version }}
            org.opencontainers.image.revision=${{ steps.upstream.outputs.vcs_ref }}
            org.opencontainers.image.source=${{ env.REPO_URL }}
            org.opencontainers.image.url=${{ env.REPO_URL }}
            build_version=Linuxserver.io version:- ${{ steps.upstream.outputs.version }} Build-date:- ${{ steps.upstream.outputs.build_date }}

      - name: Build and publish by digest (main/manual publish mode)
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          no-cache: ${{ env.NO_CACHE == 'true' }}
          pull: true
          provenance: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          build-args: |
            BASE_IMAGE_REGISTRY=${{ env.BASE_IMAGE_REGISTRY }}
            READSB_REPO_URL=${{ env.READSB_REPO_URL }}
            READSB_REPO_BRANCH=${{ env.READSB_REPO_BRANCH }}
            VCS_URL=${{ env.REPO_URL }}
          labels: |
            org.opencontainers.image.created=${{ steps.upstream.outputs.build_date }}
            org.opencontainers.image.version=${{ steps.upstream.outputs.version }}
            org.opencontainers.image.revision=${{ steps.upstream.outputs.vcs_ref }}
            org.opencontainers.image.source=${{ env.REPO_URL }}
            org.opencontainers.image.url=${{ env.REPO_URL }}
            build_version=Linuxserver.io version:- ${{ steps.upstream.outputs.version }} Build-date:- ${{ steps.upstream.outputs.build_date }}

      - name: Export digest
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          DIGEST="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest artifact
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  manifest:
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}
    needs: docker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      REGISTRY: docker.io
      DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE || secrets.DOCKERHUB_USERNAME }}
      IMAGE_NAME: readsb
    steps:
      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Resolve upstream readsb metadata
        id: upstream
        env:
          READSB_REPO_URL: https://github.com/wiedehopf/readsb
          READSB_REPO_BRANCH: dev
        run: |
          set -euo pipefail

          UPSTREAM_REPO_URL="${READSB_REPO_URL}.git"
          UPSTREAM_BRANCH="${READSB_REPO_BRANCH}"

          TMPDIR="$(mktemp -d)"
          trap 'rm -rf "${TMPDIR}"' EXIT

          git init "${TMPDIR}" >/dev/null
          git -C "${TMPDIR}" remote add origin "${UPSTREAM_REPO_URL}"
          git -C "${TMPDIR}" fetch --depth 1 origin "${UPSTREAM_BRANCH}" >/dev/null

          VCS_REF="$(git -C "${TMPDIR}" rev-parse FETCH_HEAD)"
          VERSION="$(git -C "${TMPDIR}" show FETCH_HEAD:version 2>/dev/null || git -C "${TMPDIR}" describe --tags --always --dirty FETCH_HEAD 2>/dev/null || echo unknown)"
          SHORT_VCS_REF="${VCS_REF:0:12}"

          {
            echo "vcs_ref=${VCS_REF}"
            echo "short_vcs_ref=${SHORT_VCS_REF}"
            echo "version=${VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Create and push multi-arch manifests
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}
          VERSION: ${{ steps.upstream.outputs.version }}
          SHORT_VCS_REF: ${{ steps.upstream.outputs.short_vcs_ref }}
        run: |
          set -euo pipefail

          mapfile -t DIGESTS < <(find /tmp/digests -type f -printf '%f\n' | sort)

          if [ "${#DIGESTS[@]}" -eq 0 ]; then
            echo "No digests found to assemble multi-arch manifest"
            exit 1
          fi

          SOURCES=()
          for digest in "${DIGESTS[@]}"; do
            SOURCES+=("${IMAGE_REF}@sha256:${digest}")
          done

          docker buildx imagetools create \
            --tag "${IMAGE_REF}:latest" \
            --tag "${IMAGE_REF}:${VERSION}" \
            --tag "${IMAGE_REF}:${VERSION}-${SHORT_VCS_REF}" \
            "${SOURCES[@]}"

          docker buildx imagetools inspect "${IMAGE_REF}:latest"
          docker buildx imagetools inspect "${IMAGE_REF}:${VERSION}"
          docker buildx imagetools inspect "${IMAGE_REF}:${VERSION}-${SHORT_VCS_REF}"
