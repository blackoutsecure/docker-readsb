# Caller for the hub's `bos-launchpad-release.yml` (Blackout Secure Launchpad) reusable.
#
#   monitor (github_branch_file mode) → release (docker → balena)
#
# Required vars:    DOCKERHUB_NAMESPACE, BALENA_NAMESPACE
# Required secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN, BALENA_API_TOKEN
#
# `balena.yml` is rendered by the hub on each run from the `balena_*` inputs
# below. See blackoutsecure/bos-automation-hub for the full input reference.
name: Blackout Secure Launchpad

on:
  schedule:
    - cron: '17 */6 * * *'   # stagger off :00 to dodge org cron pile-ups
  workflow_dispatch:
    # `github_release` isn't exposed — this repo opts out of automated
    # GitHub Releases entirely (hub default `false`).
    inputs:
      stage_docker:
        description: 'Stage: docker build & push'
        type: boolean
        default: true
      stage_balena:
        description: 'Stage: balena block publish'
        type: boolean
        default: true
      force_run:
        description: 'Force: run pipeline even if upstream unchanged'
        type: boolean
        default: false
      # ---- Security scan controls --------------------------------------
      # The consolidated `security_scan` stage is ON by default for
      # push + dispatch events. Skipped on `schedule` (cron only polls
      # upstream — source hasn't changed, so re-scanning every 6h is
      # wasteful). Advisory only: never gates docker/balena release.
      stage_security_scan:
        description: 'Stage: consolidated security scan (kit composite + CodeQL)'
        type: boolean
        default: true
      security_scan_use_advanced_pat:
        description: 'Advanced PAT mode: elevated posture probes (PS001/PS002/PS003) via the org-level `SCANNING_PAT`. Safe to leave on — no-op when the secret is missing (kit falls back to GITHUB_TOKEN).'
        type: boolean
        default: true

# No top-level `concurrency:` — the hub workflow owns serialization.
# Declaring it on both sides triggers a GHA self-deadlock.
permissions:
  contents: read

jobs:
  release:
    permissions:
      contents:        write   # monitor tracking-file commit
      actions:         write   # nested monitor (`gh workflow run`)
      pull-requests:   write   # nested Docker Scout PR annotations
      security-events: write   # nested Docker Scout SARIF upload
      models:          read    # cascades to hub `release.yml` -> `github-release.yml`
                               # `publish` job for the AI changelog renderer step.
                               # Validated at workflow-load time regardless of whether
                               # AI changelog is enabled by the caller.
    uses: blackoutsecure/bos-automation-hub/.github/workflows/bos-launchpad-release.yml@main
    with:
      # Schedule runs use the defaults; manual runs honour the dispatch
      # checkboxes. Every launchpad stage defaults to `false` in the
      # hub — opt in explicitly. `github_release` is left at its default
      # (this repo doesn't publish GitHub Releases).
      docker:           ${{ github.event_name != 'workflow_dispatch' || inputs.stage_docker }}
      balena:           ${{ github.event_name != 'workflow_dispatch' || inputs.stage_balena }}

      upstream_repo:    wiedehopf/readsb
      source:           github_branch_file
      upstream_branch:  dev
      track_file:       .github/upstream/readsb-dev.json
      force_run:        ${{ github.event_name == 'workflow_dispatch' && inputs.force_run }}
      # When force_run is a manual dispatch, also bypass downstream caches
      # so the rebuild ACTUALLY produces a fresh image + balena release.
      # Without these, docker re-uses GHA layer cache (same digest) and balena
      # returns the existing release for the same source SHA — the "force"
      # ends up being a no-op deploy from the device's perspective.
      docker_force:     ${{ github.event_name == 'workflow_dispatch' && inputs.force_run }}
      balena_force:     ${{ github.event_name == 'workflow_dispatch' && inputs.force_run }}

      image_name:          readsb
      dockerhub_namespace: ${{ vars.DOCKERHUB_NAMESPACE }}
      balena_namespace:    ${{ vars.BALENA_NAMESPACE }}

      # Render balena.yml dynamically — no checked-in copy.
      balena_generate_yml: true

      balena_description: >-
        LinuxServer.io style containerized build of readsb, a high-performance ADS-B
        decoder with RTL-SDR support. Features built-in automatic gain optimization,
        optional bias-T power control, and built-in feed profiles. Outputs JSON and
        network feeds in a hardened LinuxServer.io-based environment for reliable
        aircraft signal decoding.
      balena_post_provisioning: |
        ## Usage instructions

        Include this snippet in your docker-compose.yml file under 'services':

          ```
          readsb:
            image: docker.io/${{ vars.DOCKERHUB_NAMESPACE }}/readsb:latest
            restart: unless-stopped
            environment:
              - TZ=Etc/UTC
              - READSB_NET=true
              - READSB_DEVICE_TYPE=rtlsdr
              - READSB_AUTO_LOCATION=true
              - READSB_AUTOGAIN=true
              - READSB_BIASTEE=false
              - LOG_LEVEL=info
            ports:
              - '30001:30001'
              - '30002:30002'
              - '30003:30003'
              - '30004:30004'
              - '30005:30005'
              - '30104:30104'
            volumes:
              - '/path/to/readsb/config:/config'
              - '/path/to/readsb/json:/run/readsb'
            devices:
              - '/dev/bus/usb:/dev/bus/usb'
            security_opt:
              - 'no-new-privileges:true'
          ```

        Repository: https://github.com/${{ github.repository }}
        Upstream application: https://github.com/wiedehopf/readsb

      # ---- Consolidated security scan (advisory) ---------------------
      # Shell scripts under `root/` are covered by the kit composite's
      # bundled shellcheck. Skipped on `schedule` since source doesn't
      # change between upstream-version polls. Findings surface in the
      # Security tab but never block docker/balena.
      #
      # CodeQL coverage of `src/usb-reset.c` (`c-cpp`) AND the workflow
      # YAML (`actions`) is delegated to GitHub's first-party **default
      # setup** (Settings → Code security → Code scanning → CodeQL →
      # Default setup), which is already configured for both languages
      # on this repo. GitHub disallows running an advanced CodeQL
      # workflow against a repo that has default setup enabled — the
      # SARIF upload from the advanced path fails with:
      #
      #   CodeQL analyses from advanced configurations cannot be
      #   processed when the default setup is enabled
      #
      # So we explicitly skip the launchpad's CodeQL leg here
      # (`security_scan_codeql_languages: ''`) and let default setup
      # own the analyses. The launchpad's kit composite (posture /
      # actionlint / gitleaks / shellcheck) still runs and uploads
      # under its own SARIF category, independent of CodeQL.
      enable_security_scan:               ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.stage_security_scan) }}
      security_scan_fail_on:              never
      security_scan_enable_kit_composite: true
      security_scan_enable_posture:       true
      security_scan_enable_scanners:      true
      security_scan_enable_upload:        true
      security_scan_codeql_languages:     ''
      security_scan_codeql_queries:       security-and-quality
      security_scan_use_advanced_pat:     ${{ github.event_name != 'workflow_dispatch' || inputs.security_scan_use_advanced_pat }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}
      BALENA_API_TOKEN:   ${{ secrets.BALENA_API_TOKEN }}
      # Forwarded to the launchpad `security_scan` stage — only consulted
      # when `security_scan_use_advanced_pat: true` AND non-empty. Safe to
      # forward unconditionally (kit falls back to GITHUB_TOKEN when empty).
      scanning_pat:       ${{ secrets.SCANNING_PAT }}
