name: readsb
description: >-
  LinuxServer.io style containerized build of readsb, a high-performance ADS-B
  decoder with RTL-SDR support. Outputs JSON and network feeds, running in a
  hardened LinuxServer.io-based environment for reliable aircraft signal decoding.

post-provisioning: >-
  ## Usage instructions

  Include this snippet in your docker-compose.yml file under 'services':

    ```
    readsb:
      image: blackoutsecure/readsb:latest
      restart: unless-stopped
      environment:
        - TZ=Etc/UTC
        - READSB_ARGS=--net --device-type rtlsdr
      ports:
        - '30001:30001'
        - '30002:30002'
        - '30003:30003'
        - '30004:30004'
        - '30005:30005'
        - '30104:30104'
      volumes:
        - '/path/to/readsb/config:/config'
        - '/path/to/readsb/json:/run/readsb'
      devices:
        - '/dev/bus/usb:/dev/bus/usb'
    ```

  Repository: https://github.com/blackoutsecure/docker-readsb
  Upstream application: https://github.com/wiedehopf/readsb

