# .bos-launchpad.yaml — per-repo customization for the Blackout Secure
# Launchpad hub-managed kicker workflows.
#
# Schema reference: https://github.com/blackoutsecure/bos-automation-hub
# Annotated example:
#   https://github.com/blackoutsecure/bos-automation-hub/blob/main/examples/bos-launchpad-sync-files.example.yaml
#
# This file is consumer-owned. The hub never writes it; it ONLY reads
# this file from the kicker workflows (`.github/workflows/bos-launchpad-*.yml`)
# at run time.

# ----- Managed-files sync (sync-files flavor) -----
# Drives `.github/workflows/bos-launchpad-sync-files.yml` (hub-managed
# kicker, written by the `bos_launchpad_sync_files` service in
# `bos-managed-files.yaml`). Lists which dotfile / canonical-file
# service bundles the hub should keep in sync for this repo.
sync_files:
  services:
    - common
    - docker
    - balena
    - logger
    - lf_line_endings
